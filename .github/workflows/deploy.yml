name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment, don't cancel in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      # The site is prebuilt into docs/, so we don't need the resume-cv /
      # btpsj submodules (and resume-cv is private/unreachable from CI).
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload prebuilt site
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
